##################
# LRename Config #
#
#(MiniMessage Supported!)
# Use tags like <red>, <green>, <bold>, <gradient:red:blue>, or <#FF5555>
##################

# Enable/Disable specific features
settings:
  allow-renaming: true
  allow-lore-editing: true
  allow-copy-paste: true
  max-lore-lines: 10

blacklists:
  # Prevent these words from being used in names or lore (Not case-sensitive)
  words:
    - "admin"
    - "owner"
    - "staff"
    - "fuck"
    - "shit"

  # Prevent these specific materials from being modified
  materials:
    - "BEDROCK"
    - "BARRIER"
    - "COMMAND_BLOCK"

# Economy Settings
economy:
  # Choose the economy type: NONE, VAULT (Requires VaultAPI), or XP
  type: "NONE"

  # Set the cost for each action (Set to 0.0 to make an action free)
  costs:
    rename: 0.0
    lore-add: 0.0
    lore-delline: 0.0
    clear-lore: 0.0
    clear-name: 0.0
    clear-all: 0.0
    paste: 0.0

messages:
  # You can use standard color names
  prefix: "<dark_gray>[<yellow>LRename</yellow>]</dark_gray> "
  # Or you can use specific hex codes
  item-renamed: "<#55FF55>Successfully renamed your item!"
  copied: "<green>Item name and lore copied to clipboard."
  pasted: "<green>Pasted clipboard onto your item!"
  no-item: "<red>You must be holding an item in your main hand."
  feature-disabled: "<red>This feature is currently disabled."
  reached-max-lore-lines: "<red>You have reached the maximum lore lines limit!</red>"
  nothing-to-copy: "<red>That item has no custom name or lore to copy!</red>"
  nothing-to-paste: "<red>You have nothing copied to your clipboard!</red>"
  name-cleared: "<green>Cleared the custom name from the item!</green>"
  lore-cleared: "<green>Cleared all lore from the item!</green>"
  all-cleared: "<green>Cleared all custom name and lore from the item!</green>"
  config-reloaded: "<green>LRename configuration reloaded!</green>"
  lore-line-deleted: "<green>Deleted line %line% from the lore!</green>"
  invalid-line: "<red>Invalid line number! That line does not exist.</red>"
  hidden-enchants: "<green>Hidden enchantments on this item!</green>"
  unhidden-enchants: "<green>Unhidden enchantments on this item!</green>"
  hidden-attributes: "<green>Hidden attributes on this item!</green>"
  unhidden-attributes: "<green>Unhidden attributes on this item!</green>"
  template-saved: "<green>Template <yellow>%template%</yellow> saved successfully!</green>"
  templates-not-saved: "<red>This item has no custom name or lore to save!</red>"
  template-not-found: "<red>Error! Could not find specified template.</red>"
  templates-not-found: "<red>You don't have any saved templates.</red>"
  loaded-template: "<green>Loaded template <yellow>%template%</yellow> onto your item!</green>"
  deleted-template: "<green>Deleted template <yellow>%template%</yellow>!</green>"
  blacklisted-word: "<red>You cannot use that word in an item's name or lore!</red>"
  blacklisted-material: "<red>You are not allowed to modify this type of item!</red>"
  not-enough-money: "<red>You need <yellow>%cost%</yellow> to do this!</red>"
  not-enough-xp: "<red>You need <green>%cost% XP Levels</green> to do this!</red>"
  blacklisted-word: "<red>You cannot use that word in an item's name or lore!</red>"
  blacklisted-material: "<red>You are not allowed to modify this type of item!</red>"
  bypassed-word-blacklist: "<gray><italic>Notice: You bypassed the word blacklist.</italic></gray>"
  bypassed-material-blacklist: "<gray><italic>Notice: You bypassed the material blacklist.</italic></gray>"